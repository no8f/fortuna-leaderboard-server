<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortuna Leaderboard</title>
    <style>
        :root {
            --clr-wood:    #5c3a1e;
            --clr-ink:     #2a1505;
            --clr-ink-mid: #5a3010;
            --clr-score:   #2a4a10;
            --clr-status:  #7a5030;
            --clr-border:  #a07840;
            --clr-accent:  #8b6532;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--clr-wood);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .board {
            position: relative;
            width: min(640px, 100vw);
            aspect-ratio: 4 / 3;
            background-image: url('https://github.com/user-attachments/assets/105556f5-9327-43b6-adf7-d2df8ddbb835'), url('scoreboard_bg.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
        .content {
            position: absolute;
            top: 14%;
            left: 14%;
            width: 72%;
            height: 78%;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }
        th, td {
            padding: 0.35rem 0.5rem;
            text-align: left;
            color: var(--clr-ink);
            font-size: clamp(0.6rem, 1.5vw, 0.9rem);
        }
        th {
            font-size: clamp(0.55rem, 1.2vw, 0.78rem);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--clr-ink-mid);
            border-bottom: 1px solid var(--clr-border);
        }
        tr:nth-child(even) { background: rgba(139, 101, 50, 0.12); background: color-mix(in srgb, var(--clr-accent) 12%, transparent); }
        tr:hover           { background: rgba(139, 101, 50, 0.22); background: color-mix(in srgb, var(--clr-accent) 22%, transparent); }
        .rank  { color: var(--clr-ink-mid); font-weight: bold; width: 2rem; }
        .score { color: var(--clr-score);   font-weight: bold; }
        #status {
            position: absolute;
            bottom: 5%;
            left: 14%;
            width: 72%;
            font-size: clamp(0.5rem, 1vw, 0.68rem);
            color: var(--clr-status);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="board">
        <div class="content">
            <table>
                <thead>
                    <tr>
                        <th class="rank">#</th>
                        <th>Name</th>
                        <th class="score">Score</th>
                        <th>Sail</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="4" style="text-align:center;color:var(--clr-status)">Loading&hellip;</td></tr>
                </tbody>
            </table>
        </div>
        <p id="status"></p>
    </div>

    <script>
    function parseSailColor(value) {
      // value can be: number 0..7 (legacy) OR "#RRGGBB" OR number 0..0xFFFFFF
      if (typeof value === "string") {
        const s = value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(s)) return { label: s.toUpperCase(), hex: s };
        // tolerate "RRGGBB"
        if (/^[0-9a-fA-F]{6}$/.test(s)) return { label: ("#" + s).toUpperCase(), hex: ("#" + s) };
      }

      if (Number.isInteger(value)) {
        if (value >= 0 && value <= 0xFFFFFF) {
          const hex = "#" + value.toString(16).padStart(6, "0").toUpperCase();
          return { label: hex, hex };
        }
      }

      return { label: "Unknown", hex: "#888888" };
    }

        async function refresh() {
            try {
                const res = await fetch('/api/v1/scores?limit=10');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                const tbody = document.getElementById('tbody');
                if (!data.scores || data.scores.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--clr-status);text-align:center">No scores yet.</td></tr>';
                } else {
                    tbody.innerHTML = data.scores.map((s, i) => {
                    const c = parseSailColor(s.sail_color);
                        return `<tr>
                            <td class="rank">${i + 1}</td>
                            <td>${escHtml(s.name)}</td>
                            <td class="score">${s.score}</td>
                            <td><span style="color:${c.hex}">⬤</span></td>
                        </tr>`
                    }).join('');
                }
                document.getElementById('status').textContent =
                    'Last updated: ' + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e.message;
            }
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
