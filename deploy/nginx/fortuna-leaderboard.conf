# /etc/nginx/sites-available/fortuna-leaderboard
#
# Nginx reverse-proxy config for fortuna-leaderboard-server.
# Terminates TLS via Let's Encrypt and forwards requests to Drogon on
# localhost:8080 over plain HTTP.
#
# Quick setup
# -----------
# 1. Install certbot:
#      sudo apt install -y certbot python3-certbot-nginx
# 2. Copy this file:
#      sudo cp fortuna-leaderboard.conf /etc/nginx/sites-available/fortuna-leaderboard
# 3. Edit the two `server_name` directives below (replace your.domain.example).
# 4. Enable the site and obtain a certificate:
#      sudo ln -s /etc/nginx/sites-available/fortuna-leaderboard \
#                 /etc/nginx/sites-enabled/fortuna-leaderboard
#      sudo nginx -t && sudo systemctl reload nginx
#      sudo certbot --nginx -d your.domain.example
# 5. Certbot will patch the `ssl_certificate` lines automatically.
#    Verify the final config with `sudo nginx -t` and reload.

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.example;

    # Let certbot's ACME challenges through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS reverse proxy ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your.domain.example;

    # Certbot fills these in automatically after `certbot --nginx`.
    # If you manage certificates manually, set the paths here.
    ssl_certificate     /etc/letsencrypt/live/your.domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.example/privkey.pem;

    # TLSv1.2 is included for compatibility with older clients (e.g. some game
    # engines or embedded HTTP libraries). Remove it if you only need to support
    # modern browsers and can drop TLS 1.2 support.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS – tells browsers to always use HTTPS (1 year).
    # WARNING: `includeSubDomains` applies HSTS to ALL subdomains of this domain.
    # Remove it if any of your other subdomains do not yet serve HTTPS.
    # Remove or shorten max-age if you are still testing.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy headers so the backend can see the real client IP and protocol
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # Keep connections alive to Drogon
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Sensible timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
